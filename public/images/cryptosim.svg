<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7c948;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5a800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Blockchain row — 4 blocks connected by arrows -->
  <!-- Block 0 -->
  <rect x="55" y="170" width="110" height="60" rx="8" fill="url(#blockGrad)" filter="url(#glow)"/>
  <text x="110" y="196" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">#0 Genesis</text>
  <text x="110" y="213" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">0000a3f7…</text>
  <text x="110" y="225" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">🔒</text>

  <!-- Arrow -->
  <line x1="165" y1="200" x2="188" y2="200" stroke="rgba(124,58,237,0.7)" stroke-width="2"/>
  <polygon points="188,195 198,200 188,205" fill="rgba(124,58,237,0.7)"/>

  <!-- Block 1 -->
  <rect x="198" y="170" width="110" height="60" rx="8" fill="url(#blockGrad)" filter="url(#glow)"/>
  <text x="253" y="196" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">#1 Miner 3</text>
  <text x="253" y="213" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">0000c92b…</text>
  <text x="253" y="225" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">🔒</text>

  <!-- Arrow -->
  <line x1="308" y1="200" x2="331" y2="200" stroke="rgba(124,58,237,0.7)" stroke-width="2"/>
  <polygon points="331,195 341,200 331,205" fill="rgba(124,58,237,0.7)"/>

  <!-- Block 2 -->
  <rect x="341" y="170" width="110" height="60" rx="8" fill="url(#blockGrad)" filter="url(#glow)"/>
  <text x="396" y="196" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">#2 Miner 1</text>
  <text x="396" y="213" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">00001f4a…</text>
  <text x="396" y="225" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle">🔒</text>

  <!-- Arrow -->
  <line x1="451" y1="200" x2="474" y2="200" stroke="rgba(124,58,237,0.7)" stroke-width="2"/>
  <polygon points="474,195 484,200 474,205" fill="rgba(124,58,237,0.7)"/>

  <!-- Block 3 (latest, glowing brighter) -->
  <rect x="484" y="162" width="120" height="76" rx="8" fill="url(#blockGrad)" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
  <text x="544" y="188" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.85)" text-anchor="middle">#3 Miner 7</text>
  <text x="544" y="205" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">0000e81d…</text>
  <text x="544" y="220" font-family="monospace" font-size="9" fill="#f7c948" text-anchor="middle">+50 RNC</text>
  <text x="544" y="232" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">nonce: 482,917</text>

  <!-- Mining activity dots — miners below the chain -->
  <text x="400" y="285" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" text-anchor="middle">↑  miners competing  ↑</text>

  <!-- Miner dots row -->
  <g fill="none" stroke-width="1.5">
    <circle cx="130" cy="330" r="18" stroke="#7c3aed" fill="rgba(124,58,237,0.15)"/>
    <text x="130" y="335" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">M1</text>

    <circle cx="200" cy="330" r="18" stroke="#7c3aed" fill="rgba(124,58,237,0.15)"/>
    <text x="200" y="335" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">M2</text>

    <circle cx="270" cy="330" r="18" stroke="#f7c948" fill="rgba(247,201,72,0.15)" stroke-width="2"/>
    <text x="270" y="335" font-family="Arial" font-size="11" fill="#f7c948" text-anchor="middle" font-weight="bold">M3</text>

    <circle cx="340" cy="330" r="18" stroke="#7c3aed" fill="rgba(124,58,237,0.15)"/>
    <text x="340" y="335" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">M4</text>

    <circle cx="410" cy="330" r="18" stroke="#7c3aed" fill="rgba(124,58,237,0.15)"/>
    <text x="410" y="335" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">M5</text>

    <circle cx="480" cy="330" r="18" stroke="#7c3aed" fill="rgba(124,58,237,0.15)"/>
    <text x="480" y="335" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">M6</text>

    <circle cx="550" cy="330" r="18" stroke="#4ade80" fill="rgba(74,222,128,0.15)" stroke-width="2"/>
    <text x="550" y="335" font-family="Arial" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="bold">M7</text>

    <circle cx="620" cy="330" r="18" stroke="#7c3aed" fill="rgba(124,58,237,0.15)"/>
    <text x="620" y="335" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">M8</text>
  </g>

  <!-- Winner label -->
  <text x="550" y="360" font-family="Arial, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">✓ solved!</text>

  <!-- RNC coin -->
  <circle cx="710" cy="200" r="42" fill="url(#coinGrad)" filter="url(#glow)"/>
  <circle cx="710" cy="200" r="36" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <text x="710" y="192" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">₿</text>
  <text x="710" y="212" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="rgba(255,255,255,0.9)" text-anchor="middle">RNC</text>

  <!-- Title text -->
  <text x="400" y="78" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">⛏️ CryptoSim</text>
  <text x="400" y="112" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle">RennCoin Mining Simulation • Proof-of-Work • Docker</text>

  <!-- Bottom hash line -->
  <text x="400" y="440" font-family="monospace" font-size="12" fill="rgba(124,58,237,0.7)" text-anchor="middle">SHA-256 • secp256k1 • Mempool • Fork Detection • Finality</text>
</svg>
